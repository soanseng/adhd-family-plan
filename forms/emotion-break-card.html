<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="../assets/css/base.css">

  <body>
    <main class="narrow-page">
      <p class="no-print"><a href="../downloads.html">返回下載中心</a></p>
      <section class="print-sheet">
        <h1>情緒休息卡</h1>
        <div class="grid-list">
          <article class="feature-card"><h3>1. 我現在的情緒</h3><p>生氣 / 難過 / 緊張 / 累 / 不知道</p></article>
          <article class="feature-card"><h3>2. 我的身體感覺</h3><p>心跳快 / 手很緊 / 想大叫 / 想躲起來</p></article>
          <article class="feature-card"><h3>3. 我可以做的 3 件事</h3><p>喝水、深呼吸、到休息區、找大人幫忙。</p></article>
          <article class="feature-card"><h3>4. 5-4-3-2-1</h3><p>看 5 個東西、摸 4 個東西、聽 3 個聲音、聞 2 個味道、說 1 件現在安全的事。</p></article>
        </div>
      </section>
      <p class="no-print"><button class="cta-button" type="button" data-print>列印 / 另存 PDF</button></p>
    </main>
    <script type="module" src="../assets/js/forms/print-form.js"></script>
