<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>日常流程表｜ADHD 家庭本位計劃</title>
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/print.css">
  </head>
  <body>
    <main class="narrow-page">
      <p class="no-print"><a href="../downloads.html">返回下載中心</a></p>
      <section class="print-sheet">
        <h1>日常流程表</h1>
        <p>一次先練一個時段。步驟越少，越容易每天做得到。</p>
        <div class="table-wrap">
          <table>
            <thead><tr><th>時段</th><th>步驟</th><th>完成</th><th>家長提醒方式</th><th>備註</th></tr></thead>
            <tbody>
              <tr><td>起床</td><td>起床後喝水</td><td>□</td><td>短句提醒</td><td></td></tr>
              <tr><td>早晨</td><td>刷牙洗臉</td><td>□</td><td>指流程圖</td><td></td></tr>
              <tr><td>早晨</td><td>換衣服</td><td>□</td><td>只給一個指令</td><td></td></tr>
              <tr><td>出門前</td><td>檢查書包</td><td>□</td><td>一起看清單</td><td></td></tr>
            </tbody>
          </table>
        </div>
        <p class="safety-alert">提醒：如果早晨衝突很高，先把書包與衣服改到前一晚準備。</p>
      </section>
      <p class="no-print"><button class="cta-button" type="button" data-print>列印 / 另存 PDF</button></p>
    </main>
    <script type="module" src="../assets/js/forms/print-form.js"></script>
  </body>
</html>
